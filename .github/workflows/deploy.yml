name: Deploy to Railway

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Railway API
        run: |
          PROJECT_ID=$(curl -s "https://backboard.railway.app/api/v2/users/me" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" | jq -r '.teamProjects[0].id')

          echo "Project ID: $PROJECT_ID"

          curl -s "https://backboard.railway.app/api/v2/projects/$PROJECT_ID/deployments" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"serviceName":"stellar-drift","repo":"https://github.com/Clawdius2/stellar-drift"}' \
            | jq '.id, .status'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
