{% extends "base.html" %}
{% block title %}Login — Stellar Drift{% endblock %}
{% block content %}
<div class="container" style="padding-top: 3rem; max-width: 420px;">
  <h1 style="font-size: 1.8rem; text-align: center; margin-bottom: 1.5rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Welcome Back, Commander</h1>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn" style="width: 100%;">Enter Galaxy</button>
    </form>
  </div>

  <p style="text-align: center; color: var(--text-dim); font-size: 0.85rem; margin-top: 1rem;">
    New to Stellar Drift? <a href="/register">Join the expedition</a>
  </p>
</div>
{% endblock %}
