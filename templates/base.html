<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>{% block title %}Stellar Drift{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0e1a;
      --bg2: #0f1628;
      --bg3: #151d35;
      --accent: #00d4ff;
      --accent2: #f4a460;
      --ore: #f4a460;
      --gas: #9370db;
      --crystals: #00ced1;
      --dark: #8b0000;
      --text: #e8eaf6;
      --text-dim: #7986cb;
      --border: #1e2a4a;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    h1, h2, h3, h4 { font-family: 'Orbitron', sans-serif; }
    a { color: var(--accent); text-decoration: none; }
    .container { max-width: 600px; margin: 0 auto; padding: 1rem; }
    .btn {
      background: linear-gradient(135deg, var(--accent), #0099cc);
      color: #000;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      padding: 0.8rem 1.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: transform 0.1s, box-shadow 0.2s;
      display: inline-block;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,212,255,0.4); }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-ghost {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
    }
    .btn-ghost:hover { background: rgba(0,212,255,0.1); }
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.2rem;
      margin-bottom: 1rem;
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.3rem; color: var(--text-dim); font-size: 0.85rem; }
    .form-group input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem;
      color: var(--text);
      font-size: 1rem;
      font-family: 'Exo 2', sans-serif;
    }
    .form-group input:focus { outline: none; border-color: var(--accent); }
    .error { background: rgba(255,0,0,0.15); border: 1px solid #ff4444; border-radius: 8px; padding: 0.8rem; color: #ff8888; margin-bottom: 1rem; font-size: 0.9rem; }
    .stars {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .stars canvas { width: 100%; height: 100%; }
    .content { position: relative; z-index: 1; }
    .nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem;
      background: rgba(10,14,26,0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-brand {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1.1rem;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .nav-links { display: flex; gap: 1rem; align-items: center; }
    .nav-links a { color: var(--text-dim); font-size: 0.85rem; }
    .nav-links a:hover { color: var(--accent); }
    .hero {
      text-align: center;
      padding: 4rem 1rem;
    }
    .hero h1 {
      font-size: clamp(2rem, 8vw, 3.5rem);
      margin-bottom: 1rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero p {
      color: var(--text-dim);
      font-size: 1.1rem;
      max-width: 400px;
      margin: 0 auto 2rem;
      line-height: 1.6;
    }
    .features { display: grid; gap: 1rem; margin-top: 2rem; }
    .feature {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .feature-icon {
      width: 40px; height: 40px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }
    .feature h3 { font-size: 0.85rem; margin-bottom: 0.2rem; }
    .feature p { font-size: 0.8rem; color: var(--text-dim); }
    @media (min-width: 500px) {
      .features { grid-template-columns: 1fr 1fr; }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <div class="stars"><canvas id="starCanvas"></canvas></div>
  <script>
    // Animated star field
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    function init() {
      resize();
      stars = Array.from({length: 200}, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5 + 0.5,
        speed: Math.random() * 0.3 + 0.05,
        opacity: Math.random() * 0.7 + 0.3,
      }));
    }
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.opacity})`;
        ctx.fill();
        s.y -= s.speed;
        if (s.y < 0) { s.y = canvas.height; s.x = Math.random() * canvas.width; }
      });
      requestAnimationFrame(draw);
    }
    window.addEventListener('resize', resize);
    init();
    draw();
  </script>

  {% if current_user.is_authenticated %}
  <nav class="nav">
    <div class="nav-brand">⭐ Stellar Drift</div>
    <div class="nav-links">
      <a href="/">{{ current_user.username or current_user.email }}</a>
      <a href="/logout">Logout</a>
    </div>
  </nav>
  {% endif %}

  <div class="content">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
