<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stellar Drift v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/game.css">
</head>
<body>
<div class="landing">
  <div class="landing-inner">
    <div class="landing-logo">⛏️ STELLAR DRIFT</div>
    <h1>Last Shift on a Dying Rock</h1>
    <p class="landing-tagline">Build &middot; Survive &middot; Escape</p>
    <div class="landing-desc">
      Oxygen is failing. The asteroid still has enough minerals to build an escape rocket.<br>
      You have one chance. How you use it is up to you.
    </div>
    <div class="landing-openings">
      <div class="opening-line">&ldquo;Come back alive.&rdquo;</div>
    </div>
    <button class="btn-play" onclick="location.href='/game'">&#9654; Start Run</button>
    <div class="landing-tip">No account needed &mdash; play instantly.</div>
  </div>
</div>
</body>
</html>
